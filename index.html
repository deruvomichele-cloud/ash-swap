<!doctype html>
<html lang='it'>
<head>
<meta charset='utf-8' />
<meta name='viewport' content='width=device-width, initial-scale=1' />
<title>ASH Swap — USDC ↔ ASH su Base</title>
<style>
* { box-sizing: border-box; }
body { margin: 0; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
.page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; background: radial-gradient(circle at 20% 20%, #1a1030, #0b0716 55%, #050309); }
.card { width: 100%; max-width: 440px; background: rgba(22,16,38,0.9); border: 1px solid rgba(140,92,255,0.25); border-radius: 24px; padding: 28px; box-shadow: 0 24px 60px rgba(0,0,0,0.55); }
.head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
.title { margin: 0; font-size: 22px; color: #fff; }
.conn { border: 1px solid rgba(140,92,255,0.5); background: rgba(140,92,255,0.15); color: #d9caff; padding: 8px 14px; border-radius: 999px; font-size: 13px; font-weight: 600; cursor: pointer; }
.field { background: rgba(10,6,20,0.8); border: 1px solid rgba(255,255,255,0.08); border-radius: 18px; padding: 16px; margin-bottom: 6px; }
.frow { display: flex; justify-content: space-between; align-items: center; }
.frow + .frow { margin-top: 10px; }
.lbl { font-size: 12px; color: #8a82a3; text-transform: uppercase; }
.bal { font-size: 12px; color: #8a82a3; }
.inp { flex: 1; background: transparent; border: none; outline: none; color: #fff; font-size: 28px; font-weight: 600; min-width: 0; }
.pill { display: flex; align-items: center; gap: 6px; background: rgba(140,92,255,0.12); border: 1px solid rgba(140,92,255,0.25); padding: 8px 14px; border-radius: 999px; font-weight: 700; color: #fff; }
.swc { display: flex; justify-content: center; margin: -2px 0; }
.sw { width: 40px; height: 40px; border-radius: 12px; border: 4px solid #160f26; background: #2a1d4a; color: #d9caff; font-size: 18px; cursor: pointer; }
.rate { display: flex; justify-content: space-between; font-size: 13px; color: #9b93b5; margin: 16px 4px; }
.act { width: 100%; border: none; border-radius: 16px; padding: 16px; font-size: 16px; font-weight: 700; color: #fff; cursor: pointer; background: linear-gradient(135deg, #8c5cff, #5b21d6); }
.act:disabled { opacity: 0.45; cursor: not-allowed; }
.err { margin-top: 12px; font-size: 13px; color: #ff8a8a; text-align: center; }
.ok { display: block; margin-top: 12px; font-size: 13px; color: #6ee7a8; text-align: center; }
.note { margin-top: 16px; font-size: 12px; color: #6f6889; text-align: center; line-height: 1.5; }
</style>
</head>
<body><div id='root'></div><script type='module' src='/src/main.jsx'></script></body>
</html>
